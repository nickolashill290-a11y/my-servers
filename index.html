<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>servers</title>
<style>

body {
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* PERFIS */
.perfis {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 20px;
}

.perfil img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid purple;

  /* 🔒 proteção */
  user-select: none;
  -webkit-user-drag: none;
  -webkit-touch-callout: none;
}

.perfil h2 {
  font-size: 16px;
}

/* SERVIDORES */
.servidor {
  background: #1a1a2e;
  padding: 15px;
  margin: 20px auto;
  width: 250px;
  border-radius: 10px;
}

.servidor img {
  width: 60px;
  border-radius: 10px;

  /* 🔒 proteção */
  user-select: none;
  -webkit-user-drag: none;
  -webkit-touch-callout: none;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.entrar {
  background: purple;
  color: white;
}

.copiar {
  background: gray;
  color: white;
}
</style>
</head>

<body>

<h1>servers</h1>
<p>developed by two</p>
<!-- 👤 PERFIS -->
<div class="perfis">

  <div class="perfil">
    <img src="https://cdn.discordapp.com/attachments/1484732985981796433/1484909134561280171/64e312ae5dc1b311dfacb8f80a59d59b.jpg?ex=69bff0e5&is=69be9f65&hm=28dd6140f942a1bcb312f3c3d03f59f24cdbee616f074a5167c5c09db5c5d71e" draggable="false">
    <h2>Two</h2>
  </div>

  <div class="perfil">
    <img src="https://cdn.discordapp.com/avatars/1374911691984470109/e118a2ebea4e4a554677abaff5e37b6d.png?size=2048" draggable="false">
    <h2>luke | founder at moons darks</h2>
  </div>

</div>

<div class="perfil">
    <img src="https://cdn.discordapp.com/attachments/1485046681769607339/1485048269955534899/image.png?ex=69c0727a&is=69bf20fa&hm=86adb2da5c26a962f892855ef94c9199c5343d4c9b4116dceb6e0812b64b95ca" draggable="false">
    <h2>Orchidx secondary profile</h2>
  </div>

<!-- 📦 SERVIDOR -->
<div class="servidor">
  <h3>moons darks</h3>

  <button class="entrar" onclick="window.open('https://discord.gg/Dj7sF7Twk4')">
    Entrar
  </button>

  <button class="copiar" onclick="copiarLink('https://discord.gg/Dj7sF7Twk4')">
  Copiar
</button>
</div>

<div class="servidor">
  <img src="https://cdn.discordapp.com/attachments/1485046681769607339/1485050274086125749/image.png?ex=69c07458&is=69bf22d8&hm=ed229372dfe5c30a1e198b960590692cc06561153abb035c7b1991a51218be15" draggable="false">
  <h3>Servidor 1</h3>

  <button class="entrar" onclick="window.open('https://discord.gg/link1')">
    Entrar
  </button>

  <button class="copiar" onclick="copiarLink('https://discord.gg/link1')">
    Copiar
  </button>
</div>

<p>feito com amor no brasil💜</p>

<!-- 🔒 PROTEÇÃO -->
<script>
// bloqueia clique direito
document.addEventListener("contextmenu", e => e.preventDefault());

// bloqueia arrastar
document.addEventListener("dragstart", e => e.preventDefault());

// função copiar
function copiarLink() {
  navigator.clipboard.writeText("https://discord.gg/seulink");
  alert("Link copiado!");
}
</script>

</body>
</html>
